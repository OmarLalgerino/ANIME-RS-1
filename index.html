<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Auto Stream</title>
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; }
        .player-area { position: sticky; top: 0; width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 2px solid #ff9800; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .list-area { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .anime-card { background: #1a1a1a; padding: 15px; border-radius: 8px; text-align: center; border: 1px solid #333; font-size: 14px; }
        .anime-card:active { background: #ff9800; color: #000; }
        #msg { padding: 20px; text-align: center; color: #ff9800; }
    </style>
</head>
<body>

    <div class="player-area">
        <iframe id="main-video" src="" allowfullscreen></iframe>
    </div>

    <div id="msg">جاري مزامنة آخر الحلقات من Vidoza...</div>
    <div id="list" class="list-area"></div>

    <script>
        const API_TOKEN = 'beh5wtrl4tyhnqefytw0ps3gu6hovzhlxkfeis5zxglr0at77xqgefdaw3va';
        
        async function loadContent() {
            try {
                // هذا الرابط يحل مشكلة "عدم ظهور الفيديوهات" في التطبيقات
                const apiURL = `https://api.vidoza.net/v1/files/list?api_token=${API_TOKEN}`;
                const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(apiURL)}`;

                const response = await fetch(proxy);
                const data = await response.json();
                const vidozaData = JSON.parse(data.contents);

                const listDiv = document.getElementById('list');
                const msg = document.getElementById('msg');

                if (vidozaData.data && vidozaData.data.length > 0) {
                    msg.style.display = 'none';
                    vidozaData.data.forEach(file => {
                        const card = document.createElement('div');
                        card.className = 'anime-card';
                        card.innerText = file.title;
                        card.onclick = () => {
                            document.getElementById('main-video').src = `https://vidoza.net/embed-${file.code}.html`;
                            window.scrollTo(0,0);
                        };
                        listDiv.appendChild(card);
                    });
                } else {
                    msg.innerText = "لا يوجد فيديوهات في حسابك حالياً";
                }
            } catch (error) {
                msg.innerText = "فشل الاتصال! تأكد من أن الـ API Token صحيح في الإعدادات";
            }
        }
        loadContent();
    </script>
</body>
</html>
