<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: sans-serif; }
        #video-container { width: 100%; height: 250px; background: #111; position: fixed; top: 0; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        #list { margin-top: 260px; padding: 15px; }
        .episode { 
            background: #222; padding: 15px; margin-bottom: 10px; 
            border-radius: 5px; cursor: pointer; border-right: 5px solid #ff4500;
        }
    </style>
</head>
<body>

<div id="video-container">
    <div id="player">
        <p style="text-align:center; padding-top:100px;">اختر حلقة للتشغيل</p>
    </div>
</div>

<div id="list">جاري تحميل الحلقات...</div>

<script>
    // الـ ID الخاص بك الذي حددته
    const SHEET_ID = '1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY';
    // رابط التصدير الصحيح لمنع خطأ 404
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    async function loadEpisodes() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // تخطي السطر الأول (العناوين)
            
            let listHtml = '';
            rows.forEach(row => {
                // تنظيف البيانات من علامات الاقتباس
                const cols = row.split('","').map(col => col.replace(/"/g, ''));
                if (cols.length >= 2) {
                    const title = cols[0];
                    const url = cols[1];
                    listHtml += `<div class="episode" onclick="play('${url}')">${title}</div>`;
                }
            });
            document.getElementById('list').innerHTML = listHtml;
        } catch (error) {
            document.getElementById('list').innerHTML = "خطأ: تأكد من عمل Publish to Web للجدول";
        }
    }

    function play(videoUrl) {
        // تحويل الروابط تلقائياً لتعمل في المشغل
        let finalUrl = videoUrl;
        if (videoUrl.includes("vidoza.net/")) finalUrl = videoUrl.replace("vidoza.net/", "vidoza.net/embed-") + ".html";
        if (videoUrl.includes("dood")) finalUrl = videoUrl.replace("/d/", "/e/");

        // تطبيق فكرتك: Sandbox يمنع إعلانات الـ +18 والمنبثقات
        document.getElementById('player').innerHTML = `
            <iframe 
                src="${finalUrl}" 
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation-by-user-activation" 
                allowfullscreen>
            </iframe>`;

        // منع أي نافذة إعلانية منبثقة تحاول الخروج
        window.open = function() { return null; };
    }

    loadEpisodes();
</script>

</body>
</html>
