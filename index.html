<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100%; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div id="player-container">
    </div>

<script>
    // الإعدادات الخاصة بك التي أرسلتها
    const API_KEY = "953851f921d226f158ac20f1";
    const SPREADSHEET_ID = "1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY";
    
    // دالة لجلب كود الفيديو من الجدول وتشغيله
    function loadVideoFromSheet() {
        // نقوم بصناعة الرابط النهائي باستخدام الكود والـ API لضمان الربح
        // ملاحظة: استبدل 'mxict' بالكود الديناميكي القادم من جدولك
        const videoCode = "mxict"; // هنا يمكنك ربطها بـ ID الحلقة من تطبيقك
        const playerUrl = `https://animers.embedseek.online/#${videoCode}&api=all`;

        const container = document.getElementById('player-container');
        container.innerHTML = `
            <iframe 
                id="mainPlayer"
                src="${playerUrl}" 
                allow="autoplay; fullscreen" 
                allowfullscreen>
            </iframe>
        `;
    }

    // الاستماع لرسائل المشغل لضمان عمل الـ API
    window.addEventListener('message', (e) => {
        if (e.origin !== "https://animers.embedseek.online") return;
        
        if (e.data.playerStatus === 'Ready') {
            console.log("تم الاتصال بنجاح. الأرباح قيد الاحتساب.");
        }
    });

    // تشغيل الدالة عند تحميل الصفحة
    window.onload = loadVideoFromSheet;
</script>

</body>
</html>
