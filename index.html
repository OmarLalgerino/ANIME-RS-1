<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #e91e63; margin-bottom: 30px; }
        h1 { color: #e91e63; margin: 0; font-size: 2.5rem; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .anime-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        .anime-card img { width: 100%; height: 280px; object-fit: cover; }
        .info { padding: 15px; text-align: center; }
        .play-btn { background: #e91e63; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; width: 80%; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>OTAKU ZONE</h1>
    </header>

    <div id="loading" style="text-align: center;">جاري جلب الأنميات...</div>
    <div id="anime-list" class="anime-grid"></div>

    <script>
        const PROJECT_ID = "bdzbajkpaqkujbkvrjfu";
        const SB_URL = `https://${PROJECT_ID}.supabase.co`;
        const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
        
        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        async function fetchAnimeData() {
            try {
                // جلب البيانات من جدول الحلقات
                const { data: episodes, error } = await _supabase.from('episodes').select('*');

                if (error) throw error;

                const list = document.getElementById('anime-list');
                document.getElementById('loading').style.display = 'none';

                for (const ep of episodes) {
                    // جلب معلومات الأنمي تلقائياً من AniList باستخدام الـ ID
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: `query($id: Int){ Media(id: $id){ title { english native } coverImage { large } } }`,
                            variables: { id: parseInt(ep.anilist_id) }
                        })
                    });
                    
                    const aniData = await response.json();
                    const anime = aniData.data.Media;
                    const animeName = anime.title.english || anime.title.native;

                    list.innerHTML += `
                        <div class="anime-card">
                            <img src="${anime.coverImage.large}">
                            <div class="info">
                                <h3>${animeName}</h3>
                                <p>الموسم ${ep.season_number} - حلقة ${ep.episode_number}</p>
                                <a href="${ep.video_url}" target="_blank" class="play-btn">مشاهدة</a>
                            </div>
                        </div>`;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "تأكد من تفعيل صلاحية القراءة (RLS) في Supabase";
            }
        }
        fetchAnimeData();
    </script>
</body>
</html>
