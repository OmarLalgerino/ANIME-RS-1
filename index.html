<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; margin: 0; color: white; text-align: center; font-family: sans-serif; }
        #player-wrapper { position: relative; width: 100%; height: 300px; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }
        .status { padding: 10px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

<div id="player-wrapper">
    <iframe 
        id="anime-frame" 
        src="https://seekstreaming.com/embed-mxict.html" 
        sandbox="allow-scripts allow-same-origin allow-forms"
        allowfullscreen>
    </iframe>
</div>
<div class="status" id="stat">جاري محاكاة مشاهدة الإعلان...</div>

<script>
    const iframe = document.getElementById('anime-frame');
    const statusText = document.getElementById('stat');

    // 1. وظيفة لخداع السيرفر: منع فتح نوافذ جديدة مع إرسال إشارة نجاح
    window.open = function() {
        console.log("تم اعتراض محاولة فتح إعلان - إرسال إشارة 'شوهد' للسيرفر");
        statusText.innerText = "تم تخطي الإعلان بنجاح! جاري تشغيل الفيديو...";
        statusText.style.color = "#4CAF50";
        return null; // نرجع null لكي يظن السكريبت أن النافذة فتحت بنجاح
    };

    // 2. محاكاة التفاعل (User Gesture)
    // السيرفرات تنتظر نقرة، هذا الكود يجعل أي نقرة على الشاشة تذهب مباشرة للمشغل
    document.addEventListener('click', function() {
        // نرسل تركيز (Focus) للإطار لجعله يظن أن المستخدم ضغط بداخله
        iframe.focus();
        console.log("تفاعل المستخدم مسجل");
    });

    // 3. محاولة "حقن" كود التشغيل التلقائي (إذا سمحت سياسة الموقع)
    iframe.onload = function() {
        setTimeout(() => {
            // نرسل رسالة للإطار (PostMessage) لعل السيرفر يستجيب لأوامر التشغيل
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }, 2000);
    };
</script>

</body>
</html>
