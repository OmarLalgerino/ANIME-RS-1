<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS - المشغل الاحترافي</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 10px; }
        .video-wrapper { position: relative; width: 100%; max-width: 900px; margin: auto; background: #000; }
        
        /* طبقة الإعلان فوق الفيديو */
        #ad-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 50px;
            background: rgba(255, 0, 0, 0.8); color: #fff;
            display: flex; align-items: center; justify-content: center;
            z-index: 100; font-weight: bold;
        }
        .close-ad { position: absolute; right: 10px; background: #000; color: #fff; border: none; padding: 2px 8px; cursor: pointer; }

        iframe { width: 100%; height: 450px; border: none; }
        
        .anime-list { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .anime-card { background: #333; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; }
        .anime-card:hover { background: #444; border: 1px solid #ff0000; }
    </style>
</head>
<body>

    <div class="video-wrapper">
        <div id="ad-layer">
            <span>إعلان: شاهد أقوى حلقات الأنمي هنا!</span>
            <button class="close-ad" onclick="document.getElementById('ad-layer').style.display='none'">X</button>
        </div>
        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <h3>قائمة الأنمي المتاحة:</h3>
    <div id="anime-container" class="anime-list">
        </div>

    <script>
        // رابط ملف Google Sheets بصيغة JSON لسهولة القراءة
        const sheetID = "1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY";
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadAnime() {
            const response = await fetch(url);
            const text = await response.text();
            // تنظيف البيانات القادمة من جوجل
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;
            const container = document.getElementById('anime-container');

            rows.forEach(row => {
                const title = row.c[0].v; // اسم الأنمي (العمود الأول)
                const videoID = row.c[1].v; // معرف Vidoza (العمود الثاني)

                const card = document.createElement('div');
                card.className = 'anime-card';
                card.innerHTML = `<h4>${title}</h4>`;
                card.onclick = () => playVideo(videoID);
                container.appendChild(card);
            });
        }

        function playVideo(id) {
            // تحديث رابط المشغل وفتح الإعلان مجدداً
            document.getElementById('main-player').src = `https://vidoza.net/embed-${id}.html`;
            document.getElementById('ad-layer').style.display = 'flex';
        }

        window.onload = loadAnime;
    </script>
</body>
</html>
