<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS PLAYER</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* خلفية سوداء مثل التطبيقات الكبرى */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* الكود السحري للـ Sandbox */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://vidoza.net/embed-XXXXXXX.html" 
            sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true">
        </iframe>
    </div>

    <script>
        // هذا الجزء اختياري: يضمن أن الفيديو لا يخرج عن إطار الهاتف
        window.addEventListener('message', function(e) {
            if (e.data === 'close') {
                // يمكنك إضافة أكشن هنا عند إغلاق الفيديو
            }
        });
    </script>

</body>
</html>
