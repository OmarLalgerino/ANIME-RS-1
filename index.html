<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS Browser</title>
    <style>
        body { background: #0b0b0b; color: #fff; margin: 0; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        
        /* شريط علوي احترافي */
        .header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #ff4500; position: sticky; top: 0; z-index: 1000; }
        .header h1 { margin: 0; font-size: 20px; color: #ff4500; letter-spacing: 2px; }

        /* منطقة القائمة */
        #list { padding: 15px; }
        .episode-card { 
            background: #1a1a1a; padding: 20px; margin-bottom: 15px; 
            border-radius: 12px; border-right: 6px solid #ff4500; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .episode-card:active { background: #252525; transform: scale(0.98); }
        .ep-title { font-size: 16px; font-weight: bold; }
        .play-btn { background: #ff4500; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 12px; }

        /* واجهة المتصفح الداخلي (تظهر عند التشغيل) */
        #browser-overlay { 
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: #000; z-index: 2000; 
        }
        .browser-toolbar { 
            height: 50px; background: #222; display: flex; 
            align-items: center; padding: 0 10px; justify-content: space-between;
        }
        .close-btn { background: #ff4500; border: none; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        iframe { width: 100%; height: calc(100% - 50px); border: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>ANIME RS</h1>
</div>

<div id="list">جاري تحميل الحلقات...</div>

<div id="browser-overlay">
    <div class="browser-toolbar">
        <span id="current-ep-name" style="font-size:14px;">تشغيل...</span>
        <button class="close-btn" onclick="closeBrowser()">إغلاق المشغل ✕</button>
    </div>
    <iframe id="video-frame" src=""></iframe>
</div>

<script>
    const SHEET_ID = '1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1); 
            let html = '';
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                if (cols.length >= 2) {
                    html += `
                        <div class="episode-card" onclick="openBrowser('${cols[1]}', '${cols[0]}')">
                            <div class="ep-title">${cols[0]}</div>
                            <div class="play-btn">شاهد الآن</div>
                        </div>`;
                }
            });
            document.getElementById('list').innerHTML = html;
        } catch (e) { document.getElementById('list').innerHTML = "خطأ في الاتصال بالجدول"; }
    }

    function openBrowser(key, name) {
        // نستخدم رابط التضمين المباشر
        const embedUrl = `https://seekstreaming.com/embed-${key}.html`;
        
        document.getElementById('current-ep-name').innerText = name;
        document.getElementById('video-frame').src = embedUrl;
        document.getElementById('browser-overlay').style.display = 'block';
        
        // منع التمرير في الخلفية
        document.body.style.overflow = 'hidden';
    }

    function closeBrowser() {
        document.getElementById('browser-overlay').style.display = 'none';
        document.getElementById('video-frame').src = ''; // لإيقاف الفيديو تماماً
        document.body.style.overflow = 'auto';
    }

    loadData();
</script>

</body>
</html>
