<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - الموسوعة الشاملة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --bg-black: #050505; --card-bg: #111; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 30px; border-bottom: 2px solid var(--main-red); }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .anime-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .anime-card img { width: 100%; height: 350px; object-fit: cover; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #121212; margin: 2% auto; padding: 30px; width: 90%; max-width: 1000px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .close { position: absolute; left: 20px; top: 20px; font-size: 35px; cursor: pointer; color: var(--main-red); }
        .modal-body { display: flex; gap: 30px; flex-wrap: wrap; }
        .poster-area { flex: 1; min-width: 280px; }
        .poster-area img { width: 100%; border-radius: 10px; border: 2px solid var(--main-red); }
        .details-area { flex: 2; min-width: 300px; }
        .section-title { font-size: 1.3rem; color: var(--main-red); margin: 25px 0 10px; border-right: 4px solid var(--main-red); padding-right: 10px; }
        .play-btn { display: block; background: var(--main-red); color: white; text-align: center; padding: 18px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

<header><h1>OTAKU ZONE</h1></header>
<div class="container"><div id="anime-list" class="anime-grid"></div></div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-content-inner"></div>
    </div>
</div>

<script>
    const PROJECT_ID = "bdzbajkpaqkujbkvrjfu";
    const SB_URL = `https://${PROJECT_ID}.supabase.co`;
    const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function translate(text) {
        try {
            const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=${encodeURI(text)}`);
            const d = await r.json();
            return d[0].map(s => s[0]).join('');
        } catch { return text; }
    }

    async function init() {
        const { data: eps } = await _supabase.from('episodes').select('*');
        const list = document.getElementById('anime-list');

        for (const ep of eps) {
            const resp = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: `query($id: Int){ Media(id: $id){ 
                        title { romaji english native } 
                        coverImage { extraLarge }
                        description
                        averageScore
                        studios(isMain: true) { nodes { name } }
                        characters(perPage: 6, role: MAIN) { edges { node { name { full } } voiceActors(language: JAPANESE) { name { full } } } }
                    }}`,
                    variables: { id: parseInt(ep.anilist_id) }
                })
            });
            const { data: { Media: anime } } = await resp.json();
            
            // اختيار الاسم الحقيقي (Romaji)
            const realName = anime.title.romaji || anime.title.english || anime.title.native;
            
            const div = document.createElement('div');
            div.className = 'anime-card';
            div.innerHTML = `<img src="${anime.coverImage.extraLarge}"><div style="padding:15px; text-align:center; font-weight:bold;">${realName}</div>`;
            div.onclick = () => showPopUp(anime, realName, ep.video_url);
            list.appendChild(div);
        }
    }

    async function showPopUp(a, name, url) {
        const modal = document.getElementById('infoModal');
        const inner = document.getElementById('modal-content-inner');
        modal.style.display = "block";
        inner.innerHTML = "<h2>جاري الترجمة...</h2>";

        const arDesc = await translate(a.description.replace(/<[^>]*>/g, ''));
        const actors = a.characters.edges.map(e => `<li>${e.node.name.full} (🎙️ ${e.voiceActors[0]?.name.full || 'Unknown'})</li>`).join('');

        inner.innerHTML = `
            <div class="modal-body">
                <div class="poster-area">
                    <img src="${a.coverImage.extraLarge}">
                    <a href="${url}" target="_blank" class="play-btn">▶ مشاهدة الآن</a>
                </div>
                <div class="details-area">
                    <h2 style="color:var(--main-red);">${name}</h2>
                    <p><strong>الاسم الأصلي:</strong> ${a.title.native}</p>
                    <p><strong>⭐ التقييم:</strong> ${a.averageScore/10 || '??'}/10</p>
                    <p><strong>🎬 الاستوديو:</strong> ${a.studios.nodes[0]?.name || 'N/A'}</p>
                    <div class="section-title">القصة بالعربي</div>
                    <p style="line-height:1.8; color:#bbb;">${arDesc}</p>
                    <div class="section-title">الشخصيات والممثلين</div>
                    <ul style="column-count: 2; font-size: 0.9rem;">${actors}</ul>
                </div>
            </div>
        `;
    }

    function closeModal() { document.getElementById('infoModal').style.display = "none"; }
    init();
</script>
</body>
</html>
