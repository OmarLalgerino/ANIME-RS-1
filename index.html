<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - Pro Version</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --bg-black: #050505; --card-bg: #111; --text-gray: #ccc; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid var(--main-red); background: #000; }
        .container { max-width: 1300px; margin: auto; padding: 20px; }
        
        /* شبكة العرض */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .anime-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: transform 0.3s; position: relative; }
        .anime-card:hover { transform: scale(1.05); border-color: var(--main-red); }
        .anime-card img { width: 100%; height: 320px; object-fit: cover; }
        .anime-info { padding: 10px; text-align: center; font-size: 0.9rem; font-weight: bold; }

        /* النوافذ المنبثقة (Modals) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0d0d0d; margin: 2% auto; padding: 25px; width: 90%; max-width: 1100px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 35px; cursor: pointer; color: var(--main-red); }

        .modal-grid { display: grid; grid-template-columns: 320px 1fr; gap: 30px; }
        @media (max-width: 850px) { .modal-grid { grid-template-columns: 1fr; } .modal-content { margin: 5% auto; } }

        /* التبويبات */
        .tabs { display: flex; gap: 10px; margin: 20px 0; border-bottom: 1px solid #333; overflow-x: auto; white-space: nowrap; }
        .tab-btn { background: none; border: none; color: #777; cursor: pointer; padding: 12px 20px; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        .tab-btn.active { color: var(--main-red); border-bottom: 3px solid var(--main-red); }
        .tab-content { display: none; animation: fadeIn 0.5s; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تفاصيل إضافية */
        .stat-badge { display: inline-block; background: #1a1a1a; padding: 8px 15px; border-radius: 8px; margin: 5px; border: 1px solid #333; font-size: 0.85rem; }
        .studio-link { color: var(--main-red); cursor: pointer; text-decoration: underline; font-weight: bold; }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .char-item { background: #151515; display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; }
        .char-item img { width: 50px; height: 65px; border-radius: 4px; object-fit: cover; }
        .rec-list { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }
        .rec-card { min-width: 140px; text-align: center; font-size: 0.75rem; }
        .rec-card img { width: 100%; border-radius: 8px; height: 200px; object-fit: cover; }
        iframe { width: 100%; height: 450px; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

<header><h1>OTAKU ZONE</h1></header>

<div class="container">
    <div id="anime-list" class="anime-grid"></div>
</div>

<div id="fullModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('fullModal')">&times;</span>
        <div id="modal-body-content"></div>
    </div>
</div>

<div id="studioModal" class="modal">
    <div class="modal-content" style="max-width: 900px;">
        <span class="close" onclick="closeModal('studioModal')">&times;</span>
        <h2 id="studio-title" style="color:var(--main-red); border-bottom:1px solid #333; padding-bottom:10px;"></h2>
        <div id="studio-anime-list" class="anime-grid"></div>
    </div>
</div>

<script>
    // إعدادات Supabase
    const PROJECT_ID = "bdzbajkpaqkujbkvrjfu";
    const SB_URL = `https://${PROJECT_ID}.supabase.co`;
    const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r"; // تأكد من الـ Key الخاص بك
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    // دالة الترجمة التلقائية للقصة
    async function translate(text) {
        try {
            const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ar&dt=t&q=${encodeURI(text)}`);
            const d = await r.json();
            return d[0].map(s => s[0]).join('');
        } catch { return text; }
    }

    async function init() {
        const { data: allEpisodes } = await _supabase.from('episodes').select('*');
        const list = document.getElementById('anime-list');
        
        // تجميع الحلقات لمنع التكرار
        const groups = {};
        allEpisodes.forEach(ep => {
            if (!groups[ep.anilist_id]) groups[ep.anilist_id] = [];
            groups[ep.anilist_id].push(ep);
        });

        for (const id in groups) {
            const resp = await fetch('https://graphql.anilist.co', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    query: `query($id: Int){ Media(id: $id){ 
                        id title { romaji english } coverImage { extraLarge } description averageScore popularity trending
                        trailer { id site } seasonYear format status
                        studios(isMain: true) { nodes { name id } }
                        staff(perPage: 6) { nodes { name { full } primaryOccupations } }
                        characters(perPage: 12, sort: ROLE) { edges { node { name { full } image { large } } voiceActors(language: JAPANESE) { name { full } image { large } } } }
                        recommendations(perPage: 10) { nodes { mediaRecommendation { title { romaji } coverImage { large } } } }
                    }}`,
                    variables: { id: parseInt(id) }
                })
            });
            const { data: { Media: anime } } = await resp.json();
            
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.innerHTML = `
                <img src="${anime.coverImage.extraLarge}">
                <div class="anime-info">${anime.title.romaji}</div>
            `;
            card.onclick = () => showFullDetails(anime, groups[id]);
            list.appendChild(card);
        }
    }

    async function showFullDetails(a, episodes) {
        const modal = document.getElementById('fullModal');
        const body = document.getElementById('modal-body-content');
        modal.style.display = "block";
        body.innerHTML = "<h2>جاري جلب كامل البيانات والموسوعة...</h2>";

        const arDesc = await translate(a.description.replace(/<[^>]*>/g, ''));
        const studioName = a.studios.nodes[0]?.name || 'غير معروف';

        body.innerHTML = `
            <div class="modal-grid">
                <div class="side-panel">
                    <img src="${a.coverImage.extraLarge}" style="width:100%; border-radius:12px; box-shadow: 0 0 15px rgba(255,0,0,0.3);">
                    <div style="margin-top:20px;">
                        <div class="stat-badge">⭐ تقييم: ${a.averageScore/10 || '??'}</div>
                        <div class="stat-badge">🔥 شعبية: ${a.popularity}</div>
                        <div class="stat-badge">📅 السنة: ${a.seasonYear}</div>
                        <div class="stat-badge">📡 الحالة: ${a.status}</div>
                    </div>
                </div>
                <div class="main-panel">
                    <h1 style="color:var(--main-red); margin-bottom:5px;">${a.title.romaji}</h1>
                    <p style="color:#666; margin-bottom:15px;">${a.title.english || ''}</p>
                    <p>🎬 <strong>الاستوديو:</strong> <span class="studio-link" onclick="showStudioAnime('${studioName}')">${studioName}</span></p>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="openTab(event, 'info')">المعلومات</button>
                        <button class="tab-btn" onclick="openTab(event, 'chars')">الشخصيات والمؤدين</button>
                        <button class="tab-btn" onclick="openTab(event, 'staff')">الطاقم</button>
                        <button class="tab-btn" onclick="openTab(event, 'trailer')">Trailer</button>
                        <button class="tab-btn" onclick="openTab(event, 'recs')">توصيات</button>
                    </div>

                    <div id="info" class="tab-content active">
                        <h3 style="color:var(--main-red);">القصة بالعربي</h3>
                        <p style="line-height:1.8; color:var(--text-gray);">${arDesc}</p>
                        <h3 style="margin-top:25px;">حلقات المشاهدة:</h3>
                        ${episodes.sort((a,b)=>a.episode_number - b.episode_number).map(e => `
                            <a href="${e.video_url}" target="_blank" style="display:inline-block; background:var(--main-red); color:white; padding:10px 20px; margin:5px; border-radius:8px; text-decoration:none; font-weight:bold;">الحلقة ${e.episode_number}</a>
                        `).join('')}
                    </div>

                    <div id="chars" class="tab-content">
                        <div class="char-grid">${a.characters.edges.map(e => `
                            <div class="char-item">
                                <img src="${e.node.image.large}">
                                <div style="flex:1;"><strong>${e.node.name.full}</strong><br><small style="color:#888;">🎙️ ${e.voiceActors[0]?.name.full || '??'}</small></div>
                                ${e.voiceActors[0] ? `<img src="${e.voiceActors[0].image.large}" style="width:35px; height:35px; border-radius:50%;">` : ''}
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="staff" class="tab-content">
                        <ul style="column-count: 2;">${a.staff.nodes.map(s => `<li><strong>${s.name.full}</strong><br><small style="color:#888;">${s.primaryOccupations[0]}</small></li>`).join('')}</ul>
                    </div>

                    <div id="trailer" class="tab-content">
                        ${a.trailer && a.trailer.site === 'youtube' ? `<iframe src="https://www.youtube.com/embed/${a.trailer.id}" frameborder="0" allowfullscreen></iframe>` : '<p>العرض الدعائي غير متوفر حالياً.</p>'}
                    </div>

                    <div id="recs" class="tab-content">
                        <div class="rec-list">${a.recommendations.nodes.map(r => `
                            <div class="rec-card">
                                <img src="${r.mediaRecommendation.coverImage.large}">
                                <p>${r.mediaRecommendation.title.romaji}</p>
                            </div>
                        `).join('')}</div>
                    </div>
                </div>
            </div>
        `;
    }

    // وظيفة جلب أعمال الاستوديو
    async function showStudioAnime(studioName) {
        const sModal = document.getElementById('studioModal');
        const sList = document.getElementById('studio-anime-list');
        const sTitle = document.getElementById('studio-title');
        
        sModal.style.display = "block";
        sTitle.innerText = `مزيد من إنتاجات استوديو: ${studioName}`;
        sList.innerHTML = "<h3>جاري البحث في قاعدة البيانات...</h3>";

        const resp = await fetch('https://graphql.anilist.co', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                query: `query($search: String){ 
                    Page(perPage: 12) { 
                        media(search: $search, type: ANIME, sort: POPULARITY_DESC) { 
                            title { romaji } coverImage { large } averageScore
                        } 
                    } 
                }`,
                variables: { search: studioName }
            })
        });

        const { data: { Page: { media: results } } } = await resp.json();
        sList.innerHTML = results.map(res => `
            <div class="anime-card" style="font-size:0.8rem;">
                <img src="${res.coverImage.large}" style="height:240px;">
                <div style="padding:8px;">${res.title.romaji}<br><span style="color:gold;">⭐ ${res.averageScore/10 || '??'}</span></div>
            </div>
        `).join('');
    }

    function openTab(evt, tabName) {
        let content = document.getElementsByClassName("tab-content");
        for (let i = 0; i < content.length; i++) content[i].style.display = "none";
        let buttons = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < buttons.length; i++) buttons[i].className = buttons[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }

    function closeModal(id) { document.getElementById(id).style.display = "none"; }
    
    init();
</script>

</body>
</html>
