<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTAKU ZONE - MyAnimeList Verified</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --bg-black: #050505; --card-bg: #111; --text-gray: #aaa; --mal-blue: #2e51a2; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        
        /* محرك البحث */
        .search-container { text-align: center; padding: 20px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        #search-input { width: 80%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; transition: 0.3s; text-align: center; }
        #search-input:focus { border-color: var(--main-red); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .anime-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; position: relative; }
        .anime-card:hover { border-color: var(--main-red); transform: translateY(-3px); }
        .anime-card img { width: 100%; height: 260px; object-fit: cover; }
        .card-score { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: gold; padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; border: 1px solid gold; }

        /* النافذة المنبثقة */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); overflow-y: auto; }
        .modal-content { background: #0d0d0d; margin: 2% auto; padding: 20px; width: 92%; max-width: 1100px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 30px; cursor: pointer; color: var(--main-red); z-index: 10; }

        .tabs { display: flex; gap: 15px; margin: 20px 0; border-bottom: 1px solid #333; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; padding: 10px 15px; font-weight: bold; transition: 0.3s; white-space: nowrap; font-size: 0.9rem; }
        .tab-btn.active { color: var(--main-red); border-bottom: 3px solid var(--main-red); }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        .char-grid, .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .item-card { display: flex; align-items: center; background: #151515; padding: 8px; border-radius: 8px; gap: 10px; }
        .item-card img { width: 50px; height: 70px; border-radius: 5px; object-fit: cover; }
        
        .sidebar-info { background: #111; padding: 15px; border-radius: 10px; font-size: 0.85rem; line-height: 1.8; margin-top: 15px; }
        .sidebar-info strong { color: var(--text-gray); }
        .video-container { width: 100%; height: 450px; border-radius: 10px; border: 1px solid #333; margin-top: 10px; }
        .studio-link { color: var(--main-red); cursor: pointer; text-decoration: underline; }

        /* ستايل زر اختيار الموسم */
        .season-selector {
            background: #1a1a1a;
            color: white;
            border: 1px solid var(--main-red);
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 15px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="search-input" placeholder="بحث في الأنميات المضافة..." onkeyup="filterAnime()">
</div>

<div class="container">
    <div id="anime-list" class="anime-grid"></div>
</div>

<div id="fullModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-data"></div>
    </div>
</div>

<script>
    const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
    const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function translateAr(text) {
        if(!text) return "غير متوفر";
        try {
            const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=${encodeURI(text)}`);
            const d = await r.json();
            return d[0].map(s => s[0]).join('');
        } catch { return text; }
    }

    async function init() {
        const { data: episodes } = await _supabase.from('episodes').select('*');
        const list = document.getElementById('anime-list');
        const groups = {};
        
        episodes.forEach(e => { if (!groups[e.mal_id]) groups[e.mal_id] = []; groups[e.mal_id].push(e); });

        for (const id in groups) {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${id}/full`);
            const { data: anime } = await res.json();
            
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.setAttribute('data-search', `${anime.title} ${anime.title_japanese}`);
            card.innerHTML = `
                <div class="card-score">⭐ ${anime.score || 'N/A'}</div>
                <img src="${anime.images.jpg.large_image_url}">
                <div style="padding:10px; font-size:0.8rem; text-align:center; font-weight:bold;">${anime.title}</div>
            `;
            card.onclick = () => showDetails(anime, groups[id]);
            list.appendChild(card);
        }
    }

    async function showDetails(a, eps) {
        const modal = document.getElementById('fullModal');
        const content = document.getElementById('modal-data');
        modal.style.display = 'block';
        content.innerHTML = "<h3 style='text-align:center;'>جاري جلب بيانات MyAnimeList والتعريب...</h3>";

        // تنظيم الحلقات حسب الموسم
        const seasonsMap = {};
        eps.forEach(e => {
            if (!seasonsMap[e.season_number]) seasonsMap[e.season_number] = [];
            seasonsMap[e.season_number].push(e);
        });
        const sortedSeasonKeys = Object.keys(seasonsMap).sort((n1, n2) => n1 - n2);

        const [charRes, staffRes, arStory, arStatus, arRating] = await Promise.all([
            fetch(`https://api.jikan.moe/v4/anime/${a.mal_id}/characters`).then(r => r.json()),
            fetch(`https://api.jikan.moe/v4/anime/${a.mal_id}/staff`).then(r => r.json()),
            translateAr(a.synopsis),
            translateAr(a.status),
            translateAr(a.rating)
        ]);

        content.innerHTML = `
            <div style="display:grid; grid-template-columns: 300px 1fr; gap:25px;">
                <div>
                    <img src="${a.images.jpg.large_image_url}" style="width:100%; border-radius:10px; border:1px solid #333;">
                    
                    <div style="margin-top:15px;">
                        <label style="font-size:0.8rem; color:var(--text-gray); display:block; margin-bottom:5px;">اختر الموسم:</label>
                        <select class="season-selector" id="season-dropdown">
                            ${sortedSeasonKeys.map(s => `<option value="${s}">الموسم ${s}</option>`).join('')}
                        </select>
                    </div>

                    <div class="sidebar-info">
                        <p><strong>⭐ تقييم MAL:</strong> ${a.score}</p>
                        <p><strong>⏳ الحالة:</strong> ${arStatus}</p>
                        <p><strong>📺 النوع:</strong> ${a.type}</p>
                        <p><strong>📅 الموسم:</strong> ${a.season || ''} ${a.year || ''}</p>
                        <p><strong>🎬 الاستوديو:</strong> <span class="studio-link" onclick="loadStudioWorks('${a.studios[0]?.name}')">${a.studios[0]?.name || 'Unknown'}</span></p>
                        <p><strong>🔞 الفئة:</strong> ${arRating}</p>
                    </div>
                </div>
                
                <div>
                    <h1 style="margin:0; color:var(--main-red);">${a.title}</h1>
                    <p style="color:#666;">${a.title_japanese}</p>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab(event, 'info')">المشاهدة والقصة</button>
                        <button class="tab-btn" onclick="switchTab(event, 'chars')">الشخصيات والمؤدين</button>
                        <button class="tab-btn" onclick="switchTab(event, 'staff')">طاقم العمل</button>
                        <button class="tab-btn" onclick="switchTab(event, 'trailer')">الفيديو الترويجي</button>
                    </div>

                    <div id="info" class="tab-content active">
                        <h3 style="color:var(--main-red);">القصة بالعربية</h3>
                        <p style="line-height:1.7; color:#ccc; font-size:0.95rem;">${arStory}</p>
                        <h3>حلقات المشاهدة:</h3>
                        <div id="episodes-display" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
                    </div>

                    <div id="chars" class="tab-content">
                        <div class="char-grid">${charRes.data.slice(0,12).map(c => `
                            <div class="item-card">
                                <img src="${c.character.images.jpg.image_url}">
                                <div style="flex:1;"><strong>${c.character.name}</strong><br><small style="color:#888;">🎙️ ${c.voice_actors[0]?.person.name || 'مجهول'}</small></div>
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="staff" class="tab-content">
                        <div class="staff-grid">${staffRes.data.slice(0,8).map(s => `
                            <div class="item-card">
                                <img src="${s.person.images.jpg.image_url}">
                                <div><strong>${s.person.name}</strong><br><small style="color:var(--main-red);">${s.positions[0]}</small></div>
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="trailer" class="tab-content">
                        ${a.trailer.embed_url ? `<iframe class="video-container" src="${a.trailer.embed_url}" frameborder="0" allowfullscreen></iframe>` : '<h3>الفيديو الترويجي غير متوفر.</h3>'}
                    </div>
                </div>
            </div>
        `;

        const dropdown = document.getElementById('season-dropdown');
        const display = document.getElementById('episodes-display');

        const updateEps = (sNum) => {
            const sorted = seasonsMap[sNum].sort((x, y) => x.episode_number - y.episode_number);
            display.innerHTML = sorted.map(e => `
                <a href="${e.video_url}" target="_blank" style="background:var(--main-red); color:white; padding:12px 25px; border-radius:5px; text-decoration:none; font-weight:bold;">الحلقة ${e.episode_number}</a>
            `).join('');
        };

        dropdown.onchange = (e) => updateEps(e.target.value);
        updateEps(sortedSeasonKeys[0]); // عرض حلقات أول موسم متوفر تلقائياً
    }

    async function loadStudioWorks(name) {
        const content = document.getElementById('modal-data');
        content.innerHTML = `<h3>جاري جلب أعمال استوديو ${name}...</h3>`;
        const res = await fetch(`https://api.jikan.moe/v4/anime?q=${name}&order_by=score&sort=desc`);
        const { data } = await res.json();
        let html = `<h2 style="color:var(--main-red);">إنتاجات استوديو ${name}</h2><div class="anime-grid">`;
        data.slice(0,10).forEach(m => {
            html += `<div class="anime-card"><img src="${m.images.jpg.large_image_url}"><div style="padding:10px; font-size:0.7rem; text-align:center;">${m.title}</div></div>`;
        });
        html += `</div><button onclick="closeModal()" style="margin-top:20px; background:#222; color:white; border:none; padding:10px 20px; cursor:pointer; border-radius:5px;">إغلاق</button>`;
        content.innerHTML = html;
    }

    function filterAnime() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.anime-card').forEach(card => {
            card.style.display = card.getAttribute('data-search').toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    function switchTab(e, id) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
    }

    function closeModal() { document.getElementById('fullModal').style.display = 'none'; }
    init();
</script>
</body>
</html>
