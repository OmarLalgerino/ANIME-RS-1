<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS - الإصدار الاحترافي المطور</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background-color: #111;
            padding: 15px 0;
            text-align: center;
            border-bottom: 3px solid #e50914;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 20px;
        }

        /* حاوية المشغل */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
        }

        /* إعلانك الخاص (الطبقة العلوية) */
        #top-ad-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background: rgba(229, 9, 20, 0.9);
            color: white;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            font-size: 13px;
            font-weight: bold;
        }

        /* الطبقة الواقية ضد إعلانات جوجل والبوب أب */
        #anti-ads-shield {
            position: absolute;
            top: 40px;
            left: 0;
            width: 100%;
            height: calc(100% - 90px);
            background: rgba(0,0,0,0.1);
            z-index: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(2px);
        }

        #play-button {
            background: #e50914;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
            transition: 0.3s;
        }

        iframe {
            width: 100%;
            height: 480px;
            border: none;
        }

        /* قائمة البحث والأنمي */
        .search-section {
            margin: 25px 0;
        }

        #searchInput {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #181818;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: right;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }

        .anime-card {
            background: #181818;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .anime-card:hover {
            border: 1px solid #e50914;
            transform: scale(1.05);
        }

        .anime-card h4 {
            margin: 10px 0 0;
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>

<header>
    <h1>ANIME RS</h1>
</header>

<div class="container">
    
    <div class="video-wrapper">
        <div id="top-ad-bar">
            <span>📺 إعلان: استمتع بمشاهدة الأنمي المفضل لديك</span>
            <button onclick="this.parentElement.style.display='none'" style="background:none; border:1px solid white; color:white; padding:2px 10px; border-radius:5px; cursor:pointer;">X</button>
        </div>

        <div id="anti-ads-shield" onclick="unlockPlayer()">
            <button id="play-button">▶ تشغيل آمن</button>
        </div>

        <iframe id="main-player" src="" allowfullscreen></iframe>
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" placeholder="ابحث عن الحلقة..." onkeyup="filterAnime()">
    </div>

    <div id="anime-list" class="anime-grid">
        </div>

</div>

<script>
    const sheetID = "1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY";
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

    let allAnime = [];

    // جلب البيانات من Google Sheets
    async function loadData() {
        try {
            const response = await fetch(url);
            const text = await response.text();
            const data = JSON.parse(text.substr(47).slice(0, -2));
            const rows = data.table.rows;

            allAnime = rows.map(row => ({
                title: row.c[0] ? row.c[0].v : 'بدون عنوان',
                videoID: row.c[1] ? row.c[1].v : ''
            }));

            renderAnime(allAnime);
        } catch (error) {
            console.error("خطأ في الاتصال بالبيانات");
        }
    }

    function renderAnime(list) {
        const container = document.getElementById('anime-list');
        container.innerHTML = '';
        list.forEach(item => {
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.onclick = () => {
                const player = document.getElementById('main-player');
                player.src = `https://vidoza.net/embed-${item.videoID}.html`;
                document.getElementById('anti-ads-shield').style.display = 'flex';
                window.scrollTo({top: 0, behavior: 'smooth'});
            };
            card.innerHTML = `<h4>${item.title}</h4>`;
            container.appendChild(card);
        });
    }

    // وظيفة فك القفل ومنع فتح جوجل
    function unlockPlayer() {
        // منع مغادرة الصفحة (اعتراض محاولة فتح جوجل)
        window.onbeforeunload = function() {
            return "هل تريد مغادرة التطبيق؟";
        };

        // إخفاء الحماية
        document.getElementById('anti-ads-shield').style.display = 'none';

        // الغاء الاعتراض بعد 3 ثواني للسماح باستخدام التطبيق بشكل عادي
        setTimeout(() => {
            window.onbeforeunload = null;
        }, 3000);
    }

    function filterAnime() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allAnime.filter(a => a.title.toLowerCase().includes(q));
        renderAnime(filtered);
    }

    window.onload = loadData;
</script>

</body>
</html>
