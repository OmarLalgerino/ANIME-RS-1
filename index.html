<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700&family=Outfit:wght@600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* ستايل إضافي لنظام الحسابات والتعليقات */
        :root {
            --bg-primary: #050508;
            --accent: #e63946;
            --text-secondary: #8888a0;
            --border: #1e1e2e;
        }

        /* واجهة التسجيل */
        .auth-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.9); display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .auth-card {
            background: #12121a; padding: 30px; border-radius: 20px;
            border: 1px solid var(--border); width: 90%; max-width: 400px;
            text-align: center;
        }
        .auth-input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #050508; border: 1px solid var(--border);
            border-radius: 10px; color: white; outline: none;
        }
        .auth-btn {
            width: 100%; padding: 12px; background: var(--accent);
            color: white; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }

        /* التعليقات */
        .comments-section { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .comment-box {
            background: #1a1a25; border-radius: 12px; padding: 15px; margin-bottom: 10px;
            border-right: 4px solid var(--accent);
        }
        .comment-user { font-weight: bold; color: var(--accent); font-size: 13px; margin-bottom: 5px; }
        .comment-text { color: #f0f0f5; font-size: 14px; }
        
        .comment-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .comment-form input {
            flex: 1; padding: 12px; border-radius: 10px;
            background: #12121a; border: 1px solid var(--border); color: white;
        }

        /* زر اللايك */
        .like-container { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .like-btn {
            background: none; border: 2px solid var(--border); color: var(--text-secondary);
            padding: 8px 15px; border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        .like-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        /* حالة المستخدم في الهيدر */
        #user-status { font-size: 12px; color: var(--text-secondary); cursor: pointer; }
    </style>
    </head>
<body>

<div id="auth-modal" class="auth-overlay">
    <div class="auth-card">
        <h2 style="margin-bottom: 20px;">انضم إلى العائلة 🐺</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="البريد الإلكتروني">
        <input type="password" id="auth-pass" class="auth-input" placeholder="كلمة السر">
        <button class="auth-btn" onclick="handleAuth('login')">دخول</button>
        <button class="auth-btn" style="background:none; border:1px solid var(--accent);" onclick="handleAuth('signup')">إنشاء حساب جديد</button>
        <p style="margin-top: 15px; font-size: 12px; color: var(--text-secondary); cursor: pointer;" onclick="closeAuth()">إغلاق</p>
    </div>
</div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-actions">
            <div id="user-info" style="display: flex; align-items: center; gap: 10px;">
                <span id="user-status" onclick="openAuth()">تسجيل الدخول</span>
            </div>
            </div>
    </div>
</nav>

<div id="anime-modal">
    <div class="modal-body">
        <div class="like-container">
            <button id="like-btn" class="like-btn" onclick="toggleLike()">❤ أعجبني</button>
            <span id="like-count" style="font-size: 14px;">0 إعجاب</span>
        </div>

        <div class="comments-section">
            <h3 style="margin-bottom: 15px;">التعليقات</h3>
            <div id="comment-input-area" class="comment-form" style="display: none;">
                <input type="text" id="comment-text" placeholder="اكتب رأيك في هذا الأنمي...">
                <button class="btn-primary" style="padding: 5px 15px;" onclick="postComment()">نشر</button>
            </div>
            <p id="login-to-comment" style="font-size: 13px; color: var(--text-secondary);">يرجى <span style="color:var(--accent); cursor:pointer;" onclick="openAuth()">تسجيل الدخول</span> لكتابة تعليق.</p>
            
            <div id="comments-list">
                </div>
        </div>
    </div>
</div>

<script>
// إعدادات Supabase (ضع مفاتيحك هنا)
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r"; // تأكد من الـ Anon Key
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;

// 1. إدارة المستخدمين
async function checkUser() {
    const { data } = await _supabase.auth.getUser();
    if (data?.user) {
        currentUser = data.user;
        document.getElementById('user-status').textContent = "حسابي (" + currentUser.email.split('@')[0] + ")";
        document.getElementById('comment-input-area').style.display = 'flex';
        document.getElementById('login-to-comment').style.display = 'none';
    }
}

function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }

async function handleAuth(type) {
    const email = document.getElementById('auth-email').value;
    const pass = document.getElementById('auth-pass').value;
    
    let result;
    if(type === 'signup') {
        result = await _supabase.auth.signUp({ email, password: pass });
    } else {
        result = await _supabase.auth.signInWithPassword({ email, password: pass });
    }

    if (result.error) alert(result.error.message);
    else {
        alert("نجحت العملية!");
        location.reload();
    }
}

// 2. نظام التعليقات (ربط بالمودال)
async function loadComments(animeId) {
    const { data, error } = await _supabase
        .from('comments') // تأكد من إنشاء جدول باسم comments في Supabase
        .select('*')
        .eq('anime_id', animeId)
        .order('created_at', { ascending: false });

    const list = document.getElementById('comments-list');
    list.innerHTML = data.length ? '' : '<p style="color:gray; font-size:12px;">لا توجد تعليقات بعد، كن أول المعلقين!</p>';
    
    data.forEach(c => {
        list.innerHTML += `
            <div class="comment-box">
                <div class="comment-user">${c.user_email}</div>
                <div class="comment-text">${c.content}</div>
            </div>`;
    });
}

async function postComment() {
    const text = document.getElementById('comment-text').value;
    if (!text || !currentModalAnime) return;

    const { error } = await _supabase.from('comments').insert([{
        anime_id: currentModalAnime.mal_id,
        user_id: currentUser.id,
        user_email: currentUser.email.split('@')[0],
        content: text
    }]);

    if (error) alert("خطأ في النشر");
    else {
        document.getElementById('comment-text').value = '';
        loadComments(currentModalAnime.mal_id);
    }
}

// 3. نظام اللايكات
async function toggleLike() {
    if (!currentUser) return openAuth();
    const animeId = currentModalAnime.mal_id;
    
    // فحص إذا كان المستخدم وضع لايك مسبقاً
    const { data } = await _supabase.from('likes').select('*').eq('anime_id', animeId).eq('user_id', currentUser.id);

    if (data.length > 0) {
        await _supabase.from('likes').delete().eq('anime_id', animeId).eq('user_id', currentUser.id);
    } else {
        await _supabase.from('likes').insert([{ anime_id: animeId, user_id: currentUser.id }]);
    }
    updateLikeStatus(animeId);
}

async function updateLikeStatus(animeId) {
    const { count } = await _supabase.from('likes').select('*', { count: 'exact' }).eq('anime_id', animeId);
    document.getElementById('like-count').textContent = `${count || 0} إعجاب`;
    
    if (currentUser) {
        const { data } = await _supabase.from('likes').select('*').eq('anime_id', animeId).eq('user_id', currentUser.id);
        document.getElementById('like-btn').classList.toggle('active', data.length > 0);
    }
}

// تعديل دالة فتح المودال الأصلية لتستدعي هذه الوظائف
const originalOpenModal = openModal;
openModal = async function(malId) {
    await originalOpenModal(malId);
    loadComments(malId);
    updateLikeStatus(malId);
};

// تشغيل فحص المستخدم عند التحميل
window.onload = checkUser;

// [بقية الأكواد الأصلية للتحميل و Jikan API]
</script>
</body>
</html>
