<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone | عالم الأنمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --glow-red: #ff4d4d; --bg-black: #050505; --card-bg: #111; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        
        /* الهوية البصرية - نيون */
        header { text-align: center; padding: 40px 20px; background: linear-gradient(to bottom, #1a0000, var(--bg-black)); border-bottom: 1px solid var(--main-red); box-shadow: 0 0 15px rgba(255, 0, 0, 0.2); }
        h1 { color: white; margin: 0; font-size: 3rem; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px var(--glow-red), 0 0 20px var(--glow-red); }
        
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }

        /* ستايل بطاقة الأنمي */
        .anime-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.4s; position: relative; }
        .anime-card:hover { transform: scale(1.03); border-color: var(--main-red); box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); }
        .anime-card img { width: 100%; height: 400px; object-fit: cover; }
        
        .info { padding: 20px; border-top: 2px solid var(--main-red); }
        .info h3 { margin: 0 0 10px 0; color: white; font-size: 1.2rem; }
        
        /* القصة والتقييم */
        .meta-data { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        .rating { color: #ffcc00; text-shadow: 0 0 5px rgba(255, 204, 0, 0.5); }
        .studio { color: #00ccff; }
        .description { font-size: 0.85rem; color: #bbb; line-height: 1.6; height: 80px; overflow-y: auto; margin-bottom: 15px; padding: 10px; background: #000; border-radius: 5px; }

        /* أزرار المشاهدة نيون */
        .play-btn { background: var(--main-red); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; text-decoration: none; display: block; text-align: center; font-weight: bold; transition: 0.3s; box-shadow: 0 0 10px var(--main-red); }
        .play-btn:hover { background: white; color: black; box-shadow: 0 0 20px white; }

        #loading { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--main-red); }
    </style>
</head>
<body>

    <header>
        <h1>OTAKU ZONE</h1>
        <p style="color: #666;">اكتشف، شاهد، واستمتع</p>
    </header>

    <div class="container">
        <div id="loading">جاري جلب البيانات من AniList...</div>
        <div id="anime-list" class="anime-grid"></div>
    </div>

    <script>
        const PROJECT_ID = "bdzbajkpaqkujbkvrjfu";
        const SB_URL = `https://${PROJECT_ID}.supabase.co`;
        const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        async function fetchAnimeData() {
            try {
                const { data: episodes, error } = await _supabase.from('episodes').select('*');
                if (error) throw error;

                const list = document.getElementById('anime-list');
                document.getElementById('loading').style.display = 'none';

                for (const ep of episodes) {
                    // طلب كل المعلومات (القصة، التقييم، الاستوديو)
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: `query($id: Int){ Media(id: $id){ 
                                title { english native } 
                                coverImage { extraLarge }
                                description
                                averageScore
                                studios(isMain: true) { nodes { name } }
                            }}`,
                            variables: { id: parseInt(ep.anilist_id) }
                        })
                    });
                    
                    const aniData = await response.json();
                    const anime = aniData.data.Media;
                    const animeName = anime.title.english || anime.title.native;
                    const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : "??";
                    const studio = anime.studios.nodes[0] ? anime.studios.nodes[0].name : "N/A";
                    
                    // تنظيف القصة
                    const cleanDesc = anime.description ? anime.description.replace(/<[^>]*>/g, '') : "لا يوجد وصف حالياً.";

                    list.innerHTML += `
                        <div class="anime-card">
                            <img src="${anime.coverImage.extraLarge}" alt="Poster">
                            <div class="info">
                                <h3>${animeName}</h3>
                                <div class="meta-data">
                                    <span class="rating">⭐ ${score}/10</span>
                                    <span class="studio">🎬 ${studio}</span>
                                </div>
                                <div class="description"><strong>القصة:</strong> ${cleanDesc}</div>
                                <p style="font-size: 0.8rem; color: #777;">الموسم ${ep.season_number} - الحلقة ${ep.episode_number}</p>
                                <a href="${ep.video_url}" target="_blank" class="play-btn">شاهد الآن</a>
                            </div>
                        </div>`;
                }
            } catch (err) {
                document.getElementById('loading').innerText = "حدث خطأ في الاتصال!";
            }
        }
        fetchAnimeData();
    </script>
</body>
</html>
