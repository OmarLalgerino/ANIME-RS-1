<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; }
        /* طبقة حماية إضافية لمنع النقرات العشوائية */
        .ad-shield { position: absolute; top: 0; left: 0; width: 100%; height: 40px; z-index: 999; background: transparent; }
    </style>
</head>
<body>

<div class="video-container">
    <div class="ad-shield"></div>
    
    <iframe 
        id="player"
        src="رابط_الحلقة_الممتاز_الخاص_بك" 
        /* تم إضافة صلاحية top-navigation لمنع خطأ 404 مع منع المنبثقات */
        sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation-by-user-activation"
        style="width: 100%; height: 100%; border: none;"
        allowfullscreen>
    </iframe>
</div>

<script>
    // سكربت منع النوافذ المنبثقة (بمثابة DNS داخلي للروابط)
    (function() {
        const originalOpen = window.open;
        window.open = function(url) {
            // إذا كان الرابط يحتوي على كلمات مشبوهة يتم حظره فوراً
            const blackList = ['ads', 'pop', 'doubleclick', 'sex', 'adult', '18'];
            const isBlocked = blackList.some(word => url.toLowerCase().includes(word));
            
            if (isBlocked) {
                console.log("تم حظر إعلان غير لائق: " + url);
                return null;
            }
            return originalOpen(url);
        };
    })();

    // تصحيح الرابط تلقائياً لضمان عدم ظهور 404
    window.onload = function() {
        let frame = document.getElementById('player');
        let url = frame.src;
        // التأكد من أن الرابط بصيغة embed ليعمل داخل التطبيق
        if (url.includes("vidoza.net/") && !url.includes("embed-")) {
            frame.src = url.replace("vidoza.net/", "vidoza.net/embed-") + ".html";
        }
        if (url.includes("dood") && !url.includes("/e/")) {
            frame.src = url.replace("/d/", "/e/");
        }
    };
</script>

</body>
</html>
