<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS - Player</title>
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: sans-serif; }
        #video-container { width: 100%; height: 230px; position: fixed; top: 0; background: #000; z-index: 999; }
        iframe { width: 100%; height: 100%; border: none; }
        #list { margin-top: 240px; padding: 15px; }
        .card { background: #1a1a1a; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #ff4500; cursor: pointer; }
    </style>
</head>
<body>

<div id="video-container">
    <div id="player_area">
        <div style="text-align:center; padding-top:90px; color:#555;">اختر حلقة للمشاهدة</div>
    </div>
</div>

<div id="list">جاري تحميل القائمة...</div>

<script>
    const SHEET_ID = '1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1); 
            let html = '';
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                if (cols.length >= 2) {
                    // نرسل الكود (مثل mxict) فقط للدالة
                    html += `<div class="card" onclick="play('${cols[1]}')"><b>${cols[0]}</b><br>الحلقة: ${cols[2] || '1'}</div>`;
                }
            });
            document.getElementById('list').innerHTML = html;
        } catch (e) { document.getElementById('list').innerHTML = "خطأ في جلب البيانات"; }
    }

    function play(key) {
        // نستخدم رابط التضمين المباشر لتجاوز الإعلانات قدر الإمكان
        let embedUrl = `https://animers.embedseek.online/#${key}`;
        
        document.getElementById('player_area').innerHTML = `
            <iframe 
                src="${embedUrl}" 
                allowfullscreen 
                allow="autoplay; fullscreen">
            </iframe>`;
    }

    loadData();
</script>
</body>
</html>
