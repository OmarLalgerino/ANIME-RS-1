<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #e91e63; margin-bottom: 30px; }
        h1 { color: #e91e63; margin: 0; font-size: 2.5rem; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 10px; }
        .anime-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; transition: transform 0.3s; border: 1px solid #333; }
        .anime-card:hover { transform: translateY(-5px); border-color: #e91e63; }
        .anime-card img { width: 100%; height: 280px; object-fit: cover; }
        .info { padding: 15px; text-align: center; }
        .info h3 { margin: 10px 0; font-size: 1.1rem; height: 2.4em; overflow: hidden; }
        .info p { color: #aaa; font-size: 0.9rem; margin-bottom: 15px; }
        .play-btn { background: #e91e63; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; width: 80%; font-weight: bold; }
        .play-btn:hover { background: #c2185b; }
        #loading { text-align: center; font-size: 1.2rem; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>OTAKU ZONE</h1>
        <p>مرحباً بك في بوابتك لعالم الأنمي</p>
    </header>

    <div id="loading">جاري تحميل أحدث الحلقات من السيرفر...</div>
    <div id="anime-list" class="anime-grid"></div>

    <script>
        // إعدادات الربط الخاصة بك
        const PROJECT_ID = "bdzbajkpaqkujbkvrjfu";
        const SB_URL = `https://${PROJECT_ID}.supabase.co`;
        const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
        
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        async function fetchAnimeData() {
            try {
                // 1. جلب الحلقات من جدولك في Supabase
                const { data: episodes, error } = await supabase
                    .from('episodes')
                    .select('*');

                if (error) throw error;

                const list = document.getElementById('anime-list');
                const loading = document.getElementById('loading');
                loading.style.display = 'none';

                if (episodes.length === 0) {
                    loading.innerText = "لا توجد حلقات مضافة حالياً في السيرفر.";
                    loading.style.display = 'block';
                    return;
                }

                // 2. معالجة كل حلقة وجلب معلوماتها من AniList تلقائياً
                for (const ep of episodes) {
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: `query($id: Int){ Media(id: $id){ title { english native } coverImage { large } } }`,
                            variables: { id: ep.anilist_id }
                        })
                    });
                    
                    const aniData = await response.json();
                    const anime = aniData.data.Media;
                    const animeName = anime.title.english || anime.title.native;

                    // 3. عرض البطاقة في الموقع
                    list.innerHTML += `
                        <div class="anime-card">
                            <img src="${anime.coverImage.large}" alt="${animeName}">
                            <div class="info">
                                <h3>${animeName}</h3>
                                <p>الموسم ${ep.season_number} - حلقة ${ep.episode_number}</p>
                                <a href="${ep.video_url}" target="_blank" class="play-btn">مشاهدة الحلقة</a>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "حدث خطأ أثناء الاتصال بالقاعدة.";
            }
        }

        fetchAnimeData();
    </script>
</body>
</html>
