<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الأنمي - تحديث تلقائي</title>
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; text-align: center; }
        .video-container { position: sticky; top: 0; width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 2px solid #00bcd4; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 8px; font-size: 14px; border: 1px solid #333; cursor: pointer; }
        .card:active { background: #00bcd4; color: #000; }
        #status { padding: 20px; color: #00bcd4; }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe id="player" src="" allowfullscreen></iframe>
    </div>

    <div id="status">جاري جلب الحلقات الجديدة...</div>
    <div id="list" class="list"></div>

    <script>
        // مفتاحك الحقيقي من الصورة
        const API_KEY = 'beh5wtrl4tyhnqefytw0ps3gu6hovzhlxkfeis5zxglr0at77xqgefdaw3va';

        async function syncContent() {
            try {
                // استخدام AllOrigins لتجاوز حماية التطبيق (CORS)
                const targetUrl = 'https://api.vidoza.net/v1/files';
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl, {
                    headers: {
                        // طريقة التفويض الرسمية كما في الوثائق التي أرسلتها
                        'Authorization': `Bearer ${API_KEY}`,
                        'Accept': 'application/json'
                    }
                });

                const json = await response.json();
                const result = JSON.parse(json.contents);

                const listDiv = document.getElementById('list');
                const status = document.getElementById('status');

                if (result.data && result.data.length > 0) {
                    status.style.display = 'none';
                    result.data.forEach(file => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerText = file.title;
                        div.onclick = () => {
                            document.getElementById('player').src = `https://vidoza.net/embed-${file.id}.html`;
                            window.scrollTo(0,0);
                        };
                        listDiv.appendChild(div);
                    });
                } else {
                    status.innerText = "لا توجد ملفات حالياً. ارفع أنمي جديد ليظهر هنا.";
                }
            } catch (error) {
                status.innerText = "خطأ في المزامنة. تأكد من إعدادات الـ API";
            }
        }

        syncContent();
    </script>
</body>
</html>
