<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - MAL Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --bg-black: #050505; --card-bg: #111; --text-gray: #aaa; --mal-blue: #2e51a2; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* شبكة الأنمي */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .anime-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; }
        .anime-card:hover { border-color: var(--main-red); transform: translateY(-3px); }
        .anime-card img { width: 100%; height: 260px; object-fit: cover; }
        
        /* النافذة المنبثقة */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: #0d0d0d; margin: 2% auto; padding: 20px; width: 92%; max-width: 1100px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 30px; cursor: pointer; color: var(--main-red); }

        /* التبويبات Tabs */
        .tabs { display: flex; gap: 15px; margin: 20px 0; border-bottom: 1px solid #333; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; padding: 10px 15px; font-weight: bold; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--main-red); border-bottom: 3px solid var(--main-red); }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }

        /* ستايلات العناصر */
        .char-card { display: flex; align-items: center; background: #151515; padding: 8px; border-radius: 8px; gap: 10px; margin-bottom: 10px; }
        .char-card img { width: 50px; height: 70px; border-radius: 5px; object-fit: cover; }
        .staff-grid, .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
        .video-container { width: 100%; height: 450px; border-radius: 10px; border: 1px solid #333; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--main-red); border-bottom: 1px solid #222; padding-bottom:15px;">OTAKU ZONE</h1>
    <div id="anime-list" class="anime-grid"></div>
</div>

<div id="fullModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-data"></div>
    </div>
</div>

<script>
    // بيانات Supabase الخاصة بك بناءً على الصور التي أرسلتها
    const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
    const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function init() {
        const { data: episodes } = await _supabase.from('episodes').select('*');
        const list = document.getElementById('anime-list');
        
        const groups = {};
        episodes.forEach(e => { if (!groups[e.mal_id]) groups[e.mal_id] = []; groups[e.mal_id].push(e); });

        for (const id in groups) {
            // جلب البيانات الأساسية من MAL
            const res = await fetch(`https://api.jikan.moe/v4/anime/${id}/full`);
            const { data: anime } = await res.json();

            const card = document.createElement('div');
            card.className = 'anime-card';
            card.innerHTML = `<img src="${anime.images.jpg.large_image_url}"><div style="padding:10px; font-size:0.85rem; text-align:center;">${anime.title}</div>`;
            card.onclick = () => showFullNetwork(anime, groups[id]);
            list.appendChild(card);
        }
    }

    async function showFullNetwork(a, eps) {
        const modal = document.getElementById('fullModal');
        const content = document.getElementById('modal-data');
        modal.style.display = 'block';
        content.innerHTML = "<h3>جاري بناء الشبكة المعلوماتية...</h3>";

        // جلب الشخصيات والمؤدين من MAL
        const charRes = await fetch(`https://api.jikan.moe/v4/anime/${a.mal_id}/characters`);
        const { data: characters } = await charRes.json();

        // جلب طاقم العمل
        const staffRes = await fetch(`https://api.jikan.moe/v4/anime/${a.mal_id}/staff`);
        const { data: staff } = await staffRes.json();

        content.innerHTML = `
            <div style="display:grid; grid-template-columns: 280px 1fr; gap:20px;">
                <div class="sidebar">
                    <img src="${a.images.jpg.large_image_url}" style="width:100%; border-radius:10px;">
                    <div style="margin-top:15px; background:#111; padding:10px; border-radius:10px; font-size:0.85rem;">
                        <p><strong>⭐ تقييم MAL:</strong> ${a.score}</p>
                        <p><strong>🎭 التصنيف:</strong> ${a.genres.map(g => g.name).join(', ')}</p>
                        <p><strong>🎬 الاستوديو:</strong> <span style="color:var(--main-red);">${a.studios[0]?.name || 'غير معروف'}</span></p>
                        <p><strong>🔞 الفئة:</strong> ${a.rating}</p>
                    </div>
                </div>
                
                <div class="main-info">
                    <h2 style="margin:0; color:var(--main-red);">${a.title}</h2>
                    
                    <div class="tabs">
                        <button class="tab-btn active" onclick="openTab(event, 'watch')">المشاهدة</button>
                        <button class="tab-btn" onclick="openTab(event, 'chars')">الشخصيات والمؤدين</button>
                        <button class="tab-btn" onclick="openTab(event, 'staff')">طاقم العمل</button>
                        <button class="tab-btn" onclick="openTab(event, 'trailer')">فيديو ترويجي</button>
                    </div>

                    <div id="watch" class="tab-content active">
                        <p style="color:var(--text-gray); line-height:1.6;">${a.synopsis || 'لا يوجد وصف حالياً.'}</p>
                        <div style="margin-top:20px;">
                            ${eps.map(e => `<a href="${e.video_url}" target="_blank" style="display:inline-block; background:var(--main-red); color:white; padding:10px 20px; margin:5px; border-radius:5px; text-decoration:none; font-weight:bold;">الحلقة ${e.episode_number}</a>`).join('')}
                        </div>
                    </div>

                    <div id="chars" class="tab-content">
                        <div class="char-grid">${characters.slice(0, 12).map(c => `
                            <div class="char-card">
                                <img src="${c.character.images.jpg.image_url}">
                                <div style="flex:1;">
                                    <strong>${c.character.name}</strong><br>
                                    <small style="color:var(--text-gray);">🎙️ ${c.voice_actors[0]?.person.name || 'غير معروف'}</small>
                                </div>
                                ${c.voice_actors[0] ? `<img src="${c.voice_actors[0].person.images.jpg.image_url}" style="width:35px; height:35px; border-radius:50%;">` : ''}
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="staff" class="tab-content">
                        <div class="staff-grid">${staff.slice(0, 8).map(s => `
                            <div class="char-card">
                                <img src="${s.person.images.jpg.image_url}">
                                <div>
                                    <strong>${s.person.name}</strong><br>
                                    <small style="color:var(--main-red);">${s.positions.join(', ')}</small>
                                </div>
                            </div>
                        `).join('')}</div>
                    </div>

                    <div id="trailer" class="tab-content">
                        ${a.trailer.embed_url ? `<iframe class="video-container" src="${a.trailer.embed_url}" frameborder="0" allowfullscreen></iframe>` : '<h3>عذراً، الفيديو الترويجي غير متوفر.</h3>'}
                    </div>
                </div>
            </div>
        `;
    }

    function openTab(evt, tabName) {
        let contents = document.getElementsByClassName("tab-content");
        for (let i = 0; i < contents.length; i++) contents[i].classList.remove("active");
        let btns = document.getElementsByClassName("tab-btn");
        for (let i = 0; i < btns.length; i++) btns[i].classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function closeModal() { document.getElementById('fullModal').style.display = 'none'; }
    init();
</script>
</body>
</html>
