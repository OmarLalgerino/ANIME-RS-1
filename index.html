<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0b0b0b; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        
        /* تصميم القائمة */
        #main-view { padding: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .card { background: #161616; border-radius: 8px; overflow: hidden; border-bottom: 2px solid red; cursor: pointer; }
        .card img { width: 100%; height: 190px; object-fit: cover; }
        .title { padding: 5px; text-align: center; font-size: 14px; }

        /* تصميم المشغل */
        #player-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 999; }
        .back-btn { background: red; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; }
        .video-box { width: 100%; height: calc(100% - 40px); position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="main-view">
        <h2 style="text-align: center; color: red;">ANIME RS</h2>
        <div class="grid" id="animeGrid"></div>
    </div>

    <div id="player-view">
        <button class="back-btn" onclick="closePlayer()">⬅ العودة للقائمة</button>
        <div class="video-box" id="videoBox"></div>
    </div>

    <script>
        // رابط جدول البيانات (تأكد أن الرابط يعمل بصيغة CSV)
        const sheetURL = 'https://docs.google.com/spreadsheets/d/1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY/export?format=csv';

        async function loadAnime() {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = '';

            rows.forEach(row => {
                const cols = row.split(',');
                if(cols[0]) {
                    const anime = {
                        title: cols[0].trim(),
                        img: cols[1].trim(),
                        url: cols[3].trim() // هنا رابط vidoza
                    };

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<img src="${anime.img}"><div class="title">${anime.title}</div>`;
                    card.onclick = () => openPlayer(anime.url);
                    grid.appendChild(card);
                }
            });
        }

        function openPlayer(url) {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'block';
            
            // وضع رابط Vidoza داخل iframe
            document.getElementById('videoBox').innerHTML = `
                <iframe src="${url}" allowfullscreen scrolling="no"></iframe>
            `;
        }

        function closePlayer() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('videoBox').innerHTML = ''; // إيقاف الفيديو
        }

        loadAnime();
    </script>
</body>
</html>
