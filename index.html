<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متصفح ANIME RS</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        
        /* شريط العنوان */
        .toolbar {
            background: #222;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .toolbar input {
            flex: 1;
            padding: 8px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        .btn {
            background: #ff4500;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:active { background: #e03e00; }

        /* منطقة العرض */
        .browser-view {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* رسالة تنبيهية */
        .warning {
            font-size: 10px;
            color: #aaa;
            text-align: center;
            padding: 2px;
            background: #111;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn" onclick="goBack()">◀</button>
        <button class="btn" onclick="reload()">↻</button>
        <input type="text" id="urlInput" placeholder="أدخل الرابط هنا (https://...)" value="https://www.google.com">
        <button class="btn" onclick="goToUrl()">انطلق</button>
    </div>

    <div class="warning">ملاحظة: بعض المواقع (مثل جوجل) تمنع العرض داخل إطارات لأسباب أمنية.</div>

    <iframe id="browserFrame" class="browser-view" src="https://www.google.com/search?igu=1"></iframe>

    <script>
        const iframe = document.getElementById('browserFrame');
        const urlInput = document.getElementById('urlInput');

        // وظيفة الذهاب للرابط
        function goToUrl() {
            let url = urlInput.value.trim();
            
            // إضافة https إذا لم تكن موجودة
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            iframe.src = url;
        }

        // إعادة التحميل
        function reload() {
            iframe.src = iframe.src;
        }

        // العودة للخلف (تعمل فقط إذا كانت السياسة الأمنية للموقع تسمح)
        function goBack() {
            window.history.back();
        }

        // الضغط على Enter للبحث
        urlInput.addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                goToUrl();
            }
        });
    </script>

</body>
</html>
