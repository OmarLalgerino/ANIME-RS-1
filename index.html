<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS - Live Data</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .search-container { margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #252525; color: white; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .anime-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; border-bottom: 3px solid #e50914; text-align: center; }
        .anime-card img { width: 100%; height: 180px; object-fit: cover; }
        .anime-card-info { padding: 8px; }
        .anime-card-info h3 { font-size: 13px; margin: 5px 0; }
        .loader { text-align: center; padding: 20px; color: #e50914; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="ابحث في ANIME RS...">
    </div>

    <div id="loader" class="loader">جاري جلب قائمة الأنمي...</div>
    <div class="anime-grid" id="animeGrid"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY/export?format=csv';
        let allAnime = [];

        // دالة لجلب البيانات وتحويلها من CSV إلى Array
        async function fetchAnimeData() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // تجاهل سطر العناوين

                allAnime = rows.map(row => {
                    const columns = row.split(',');
                    return {
                        title: columns[0], // العمود الأول: الاسم
                        img: columns[1],   // العمود الثاني: رابط الصورة
                        rating: columns[2] // العمود الثالث: التقييم
                    };
                }).filter(a => a.title); // حذف السطور الفارغة

                document.getElementById('loader').style.display = 'none';
                displayAnime(allAnime);
            } catch (error) {
                document.getElementById('loader').innerText = "خطأ في تحميل البيانات. تأكد من إعدادات المشاركة.";
            }
        }

        function displayAnime(list) {
            const grid = document.getElementById('animeGrid');
            grid.innerHTML = list.map(anime => `
                <div class="anime-card">
                    <img src="${anime.img}" onerror="this.src='https://via.placeholder.com/150x200?text=No+Image'">
                    <div class="anime-card-info">
                        <h3>${anime.title}</h3>
                        <span style="color:#ffc107">⭐ ${anime.rating || 'N/A'}</span>
                    </div>
                </div>
            `).join('');
        }

        // تفعيل البحث
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allAnime.filter(a => a.title.toLowerCase().includes(term));
            displayAnime(filtered);
        });

        fetchAnimeData();
    </script>
</body>
</html>
