<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - تفاصيل الأنمي</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        header { text-align: center; padding: 20px; border-bottom: 2px solid #e91e63; margin-bottom: 30px; }
        h1 { color: #e91e63; margin: 0; font-size: 2.5rem; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .anime-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; border: 1px solid #333; padding-bottom: 15px; }
        .anime-card img { width: 100%; height: 350px; object-fit: cover; }
        .info { padding: 15px; text-align: right; }
        .rating { color: #ffc107; font-weight: bold; margin-bottom: 5px; }
        .studio { color: #00bcd4; font-size: 0.9rem; margin-bottom: 10px; }
        .description { font-size: 0.85rem; color: #ccc; line-height: 1.5; height: 75px; overflow-y: auto; background: #252525; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .play-btn { background: #e91e63; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; text-decoration: none; display: block; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>OTAKU ZONE</h1>
    </header>

    <div id="loading" style="text-align: center;">جاري جلب كامل التفاصيل...</div>
    <div id="anime-list" class="anime-grid"></div>

    <script>
        const PROJECT_ID = "bdzbajkpaqkujbkvrjfu";
        const SB_URL = `https://${PROJECT_ID}.supabase.co`;
        const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
        
        const { createClient } = supabase;
        const _supabase = createClient(SB_URL, SB_KEY);

        async function fetchAnimeData() {
            try {
                const { data: episodes, error } = await _supabase.from('episodes').select('*');
                if (error) throw error;

                const list = document.getElementById('anime-list');
                document.getElementById('loading').style.display = 'none';

                for (const ep of episodes) {
                    // طلب بيانات موسعة من AniList (التقييم، الاستوديو، الوصف)
                    const response = await fetch('https://graphql.anilist.co', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: `query($id: Int){ 
                                Media(id: $id){ 
                                    title { english native } 
                                    coverImage { extraLarge }
                                    description
                                    averageScore
                                    studios(isMain: true) { nodes { name } }
                                } 
                            }`,
                            variables: { id: parseInt(ep.anilist_id) }
                        })
                    });
                    
                    const aniData = await response.json();
                    const anime = aniData.data.Media;
                    const animeName = anime.title.english || anime.title.native;
                    const studioName = anime.studios.nodes[0] ? anime.studios.nodes[0].name : "غير معروف";
                    const score = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : "N/A";
                    
                    // تنظيف الوصف من أكواد HTML
                    const cleanDescription = anime.description ? anime.description.replace(/<br>/g, '').replace(/<i>/g, '').replace(/<\/i>/g, '') : "لا يوجد وصف متوفر.";

                    list.innerHTML += `
                        <div class="anime-card">
                            <img src="${anime.coverImage.extraLarge}">
                            <div class="info">
                                <h3>${animeName}</h3>
                                <div class="rating">⭐ التقييم: ${score}/10</div>
                                <div class="studio">🎬 الاستوديو: ${studioName}</div>
                                <div class="description"><strong>القصة:</strong> ${cleanDescription}</div>
                                <p>الموسم ${ep.season_number} - حلقة ${ep.episode_number}</p>
                                <a href="${ep.video_url}" target="_blank" class="play-btn">مشاهدة الآن</a>
                            </div>
                        </div>`;
                }
            } catch (err) {
                console.error(err);
            }
        }
        fetchAnimeData();
    </script>
</body>
</html>
