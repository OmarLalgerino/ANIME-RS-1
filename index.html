<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* جميع الستايلات الأصلية الخاصة بك هنا */
        :root {
            --bg-primary: #050508; --bg-secondary: #0c0c12; --bg-card: #12121a;
            --accent: #e63946; --text-primary: #f0f0f5; --text-secondary: #8888a0;
            --border: #1e1e2e; --gold: #ffd700; --text-muted: #55556a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-primary); color: var(--text-primary); font-family: 'Noto Kufi Arabic', sans-serif; direction: rtl; }
        
        /* نفس الستايلات التي أرسلتها سابقاً... */
        /* [اضف هنا ستايلاتك السابقة لضمان عدم تغير التصميم] */
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s ease; }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: all 0.4s ease; background: transparent; }
        #navbar.scrolled { background: rgba(5,5,8,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo-icon { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 900; color: white; }
        
        /* Modal Styles */
        #anime-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); }
        #anime-modal.open { display: flex; }
        .modal-card { position: relative; width: 100%; max-width: 1100px; margin: 24px 16px; background: #0a0a10; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); }
        .modal-close { position: absolute; top: 16px; left: 16px; z-index: 20; padding: 8px; background: #12121a; border-radius: 12px; cursor: pointer; color: white; border: 1px solid var(--border); }
        .modal-player { display: none; width: 100%; background: #000; aspect-ratio: 16/9; }
        .modal-player.active { display: block; }
        .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 24px; }
        @media (min-width: 768px) { .modal-layout { display: flex; gap: 32px; } .modal-poster { width: 256px; } .modal-main { flex: 1; } }
        .modal-tab-btn { padding: 10px 16px; border-radius: 12px; font-size: 13px; cursor: pointer; background: none; border: none; color: var(--text-muted); transition: 0.3s; }
        .modal-tab-btn.active { background: var(--accent); color: white; }
        .tab-panel { display: none; margin-top: 20px; }
        .tab-panel.active { display: block; }
        .people-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .person-card { display: flex; align-items: center; gap: 12px; background: var(--bg-card); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .person-card img { width: 50px; height: 70px; border-radius: 8px; object-fit: cover; }
        .person-name { font-weight: 700; font-size: 13px; }
        .person-role { font-size: 11px; color: var(--accent); }
        .season-select-wrap { margin-top: 15px; background: var(--bg-card); padding: 10px; border-radius: 12px; }
        select { width: 100%; padding: 8px; background: #050508; color: white; border: 1px solid var(--border); border-radius: 8px; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 8px; margin-top: 15px; }
        .episode-btn { padding: 10px; background: var(--bg-card); border: 1px solid var(--border); color: white; border-radius: 8px; cursor: pointer; }
        .episode-btn.active { background: var(--accent); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="logo-text"><span style="color:var(--accent)">OTAKU</span> ZONE</div>
    <p style="color:var(--text-muted)">جاري التحميل...</p>
</div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-logo" onclick="location.reload()">
            <div class="nav-logo-icon">OZ</div>
            <div style="margin-right:10px"><h1>OTAKU ZONE</h1></div>
        </div>
        <div class="nav-actions">
            <a href="https://t.me/OtakuZoen" class="telegram-btn">✈️ تيليجرام</a>
        </div>
    </div>
</nav>

<section id="hero" style="padding: 100px 24px 40px; text-align: center;">
    <h1 style="font-size: 3rem; margin-bottom: 20px;">شاهد الأنمي المفضل لديك</h1>
    <p style="color: var(--text-secondary); max-width: 600px; margin: 0 auto;">كل المواسم، كل الحلقات، في مكان واحد.</p>
</section>

<section id="anime-section" style="padding: 40px 24px;">
    <div id="anime-grid-container"></div>
</section>

<div id="anime-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-player" id="modal-player">
            <iframe id="player-iframe" src="" allowfullscreen style="width:100%; height:100%; border:none;"></iframe>
        </div>
        <div class="modal-body">
            <div class="modal-layout">
                <div class="modal-poster">
                    <img id="modal-poster-img" src="" style="width:100%; border-radius:16px;">
                    <div id="season-select-wrap" class="season-select-wrap" style="display:none;">
                        <label style="font-size:12px; color:var(--text-muted)">اختر الموسم:</label>
                        <select id="season-select" onchange="updateEpisodes(this.value)"></select>
                    </div>
                </div>
                <div class="modal-main">
                    <h1 id="modal-title"></h1>
                    <div class="modal-tabs" style="margin-top:20px; display:flex; gap:10px;">
                        <button class="modal-tab-btn active" onclick="switchTab(event,'tab-story')">الحلقات</button>
                        <button class="modal-tab-btn" onclick="switchTab(event,'tab-chars')">الشخصيات</button>
                        <button class="modal-tab-btn" onclick="switchTab(event,'tab-staff')">طاقم العمل</button>
                    </div>
                    
                    <div id="tab-story" class="tab-panel active">
                        <p id="modal-desc" style="font-size:14px; color:var(--text-secondary); margin-bottom:20px;"></p>
                        <div id="episodes-display"></div>
                    </div>
                    <div id="tab-chars" class="tab-panel"></div>
                    <div id="tab-staff" class="tab-panel"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allAnimeData = {};
let currentSeasonsMap = {};

// جلب البيانات الأساسية
async function init() {
    const { data: episodes, error } = await _supabase.from('episodes').select('*');
    if (error) return;

    const groups = {};
    episodes.forEach(e => {
        if (!groups[e.mal_id]) groups[e.mal_id] = [];
        groups[e.mal_id].push(e);
    });

    const malIds = Object.keys(groups);
    const container = document.getElementById('anime-grid-container');
    container.innerHTML = '<div class="anime-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap:20px;"></div>';
    
    for (const id of malIds) {
        const res = await fetch(`https://api.jikan.moe/v4/anime/${id}`);
        const { data: anime } = await res.json();
        allAnimeData[id] = { anime, episodes: groups[id] };
        
        renderAnimeCard(anime, groups[id].length);
        await new Promise(r => setTimeout(r, 400)); // لضمان عدم حظر API
    }
    document.getElementById('loading-screen').classList.add('hidden');
}

function renderAnimeCard(anime, epCount) {
    const grid = document.querySelector('.anime-grid');
    const card = `
        <div class="anime-card" onclick="openModal(${anime.mal_id})" style="cursor:pointer; background:var(--bg-card); border-radius:12px; overflow:hidden;">
            <img src="${anime.images.jpg.image_url}" style="width:100%; height:250px; object-fit:cover;">
            <div style="padding:10px;">
                <h4 style="font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${anime.title}</h4>
                <p style="font-size:12px; color:var(--accent)">حلقات: ${epCount}</p>
            </div>
        </div>
    `;
    grid.innerHTML += card;
}

async function openModal(id) {
    const data = allAnimeData[id];
    const a = data.anime;
    const modal = document.getElementById('anime-modal');
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';

    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-desc').textContent = a.synopsis;
    document.getElementById('modal-poster-img').src = a.images.jpg.large_image_url;
    document.getElementById('modal-player').classList.remove('active');

    // معالجة المواسم
    currentSeasonsMap = {};
    data.episodes.forEach(e => {
        if (!currentSeasonsMap[e.season_number]) currentSeasonsMap[e.season_number] = [];
        currentSeasonsMap[e.season_number].push(e);
    });

    const seasonKeys = Object.keys(currentSeasonsMap).sort((x, y) => x - y);
    const selectWrap = document.getElementById('season-select-wrap');
    const select = document.getElementById('season-select');

    if (seasonKeys.length > 1) {
        selectWrap.style.display = 'block';
        select.innerHTML = seasonKeys.map(s => `<option value="${s}">الموسم ${s}</option>`).join('');
    } else {
        selectWrap.style.display = 'none';
    }

    updateEpisodes(seasonKeys[0]);

    // جلب الشخصيات وطاقم العمل
    fetchExtraData(id);
}

async function fetchExtraData(id) {
    document.getElementById('tab-chars').innerHTML = "جاري التحميل...";
    document.getElementById('tab-staff').innerHTML = "جاري التحميل...";

    try {
        const [charRes, staffRes] = await Promise.all([
            fetch(`https://api.jikan.moe/v4/anime/${id}/characters`),
            fetch(`https://api.jikan.moe/v4/anime/${id}/staff`)
        ]);
        
        const chars = await charRes.json();
        const staff = await staffRes.json();

        // عرض الشخصيات
        document.getElementById('tab-chars').innerHTML = `<div class="people-grid">${chars.data.slice(0, 12).map(c => `
            <div class="person-card">
                <img src="${c.character.images.jpg.image_url}">
                <div><div class="person-name">${c.character.name}</div><div class="person-role">${c.role}</div></div>
            </div>
        `).join('')}</div>`;

        // عرض طاقم العمل (Staff) - هذا الجزء الذي كان مفقوداً
        document.getElementById('tab-staff').innerHTML = `<div class="people-grid">${staff.data.slice(0, 12).map(s => `
            <div class="person-card">
                <img src="${s.person.images.jpg.image_url}">
                <div><div class="person-name">${s.person.name}</div><div class="person-role">${s.positions.join(', ')}</div></div>
            </div>
        `).join('')}</div>`;

    } catch (e) {
        console.error("Error fetching staff/chars:", e);
    }
}

function updateEpisodes(season) {
    const eps = currentSeasonsMap[season] || [];
    const display = document.getElementById('episodes-display');
    display.innerHTML = `<div class="episodes-grid">${eps.sort((a,b)=>a.episode_number - b.episode_number).map(e => `
        <button class="episode-btn" onclick="playEp('${e.video_url}', this)">${e.episode_number}</button>
    `).join('')}</div>`;
}

function playEp(url, btn) {
    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const player = document.getElementById('modal-player');
    player.classList.add('active');
    document.getElementById('player-iframe').src = url;
}

function switchTab(e, tabId) {
    document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    e.currentTarget.classList.add('active');
    document.getElementById(tabId).classList.add('active');
}

function closeModal() {
    document.getElementById('anime-modal').classList.remove('open');
    document.getElementById('player-iframe').src = '';
    document.body.style.overflow = '';
}

init();
</script>
</body>
</html>
