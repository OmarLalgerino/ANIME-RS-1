<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تجربة مشغل الأنمي</title>
    <style>
        body { background-color: #0f0f0f; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 20px; border: 2px solid #333; }
        iframe { width: 100%; height: 100%; border: none; }
        .episode-btn { 
            background: #e91e63; color: white; padding: 15px; margin: 10px; 
            border: none; border-radius: 8px; cursor: pointer; width: 90%; font-weight: bold;
        }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="color: #00bcd4;">🎬 قائمة الحلقات المتوفرة</h2>

    <div class="video-box">
        <iframe id="main-player" src="about:blank" allowfullscreen></iframe>
    </div>

    <div id="list">
        <p class="status">جاري البحث عن الفيديوهات في حسابك...</p>
    </div>

    <script>
        // مفتاحك الذي استخرجناه من الصور
        const myToken = 'beh5wtrl4tyhnqefytw0ps3gu6hovzhlxkfeis5zxglr0at77xqgefdaw3va';

        async function fetchVideos() {
            try {
                // استخدام الرابط الجديد الخاص بـ API v1
                const response = await fetch(`https://api.vidoza.net/v1/files/list?api_token=${myToken}`);
                const data = await response.json();

                const listDiv = document.getElementById('list');
                
                if (data.data && data.data.length > 0) {
                    listDiv.innerHTML = ''; // مسح رسالة التحميل
                    
                    data.data.forEach(file => {
                        const btn = document.createElement('button');
                        btn.className = 'episode-btn';
                        btn.innerText = "▶️ تشغيل: " + file.title;
                        
                        btn.onclick = () => {
                            // تغيير رابط المشغل عند الضغط
                            document.getElementById('main-player').src = `https://vidoza.net/embed-${file.code}.html`;
                            window.scrollTo(0,0);
                        };
                        listDiv.appendChild(btn);
                    });
                } else {
                    listDiv.innerHTML = '<p class="status">لم يتم العثور على فيديوهات. تأكد من رفع الملف بشكل صحيح.</p>';
                }
            } catch (error) {
                document.getElementById('list').innerHTML = '<p class="status" style="color:red;">خطأ: تأكد من تشغيل الإنترنت أو جرب متصفح Chrome</p>';
            }
        }

        fetchVideos();
    </script>
</body>
</html>
