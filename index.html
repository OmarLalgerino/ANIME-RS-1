<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الأنمي الخارجي</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn-external { 
            background: #4CAF50; color: white; padding: 20px; margin: 10px; 
            border: none; border-radius: 12px; width: 100%; font-size: 18px; font-weight: bold;
        }
        .info { color: #aaa; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>🚀 تشغيل عبر مشغل خارجي</h2>
    <p class="info">سيتم فتح الفيديو مباشرة في MX Player أو VLC</p>

    <div id="list">جاري جلب الروابط...</div>

    <script>
        const myToken = 'beh5wtrl4tyhnqefytw0ps3gu6hovzhlxkfeis5zxglr0at77xqgefdaw3va';

        async function getDirectLinks() {
            try {
                // نطلب قائمة الملفات
                const response = await fetch(`https://api.vidoza.net/v1/files/list?api_token=${myToken}`);
                const data = await response.json();

                const listDiv = document.getElementById('list');
                
                if (data.data && data.data.length > 0) {
                    listDiv.innerHTML = '';
                    
                    data.data.forEach(file => {
                        const btn = document.createElement('button');
                        btn.className = 'btn-external';
                        btn.innerText = "📺 فتح " + file.title;
                        
                        btn.onclick = () => {
                            // هذا الرابط يخبر الأندرويد بفتح مشغل فيديو خارجي
                            // نستخدم بروتوكول "intent" الخاص بالأندرويد
                            const videoUrl = `https://vidoza.net/embed-${file.code}.html`; 
                            // ملاحظة: للحصول على الرابط المباشر 100% تحتاج لطلب إضافي،
                            // لكن معظم المشغلات تستطيع قراءة رابط التضمين إذا تم توجيهها بشكل صحيح.
                            
                            window.location.href = `intent:${videoUrl}#Intent;package=com.mxtech.videoplayer.ad;end`;
                        };
                        listDiv.appendChild(btn);
                    });
                }
            } catch (e) {
                listDiv.innerHTML = "خطأ في الاتصال";
            }
        }
        getDirectLinks();
    </script>
</body>
</html>
