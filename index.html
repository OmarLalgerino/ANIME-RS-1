<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS Player</title>
    <style>
        body { background-color: #0d0d0d; color: #fff; margin: 0; font-family: sans-serif; }
        #video-section { 
            width: 100%; height: 230px; background: #000; 
            position: fixed; top: 0; z-index: 100;
        }
        iframe { width: 100%; height: 100%; border: none; }
        #list { margin-top: 245px; padding: 15px; }
        .episode-card { 
            background: #1a1a1a; padding: 15px; margin-bottom: 12px; 
            border-radius: 10px; border-right: 4px solid #ff4500; cursor: pointer;
        }
        .anime-title { font-size: 16px; font-weight: bold; color: #ff4500; }
        .ep-info { font-size: 14px; color: #bbb; }
    </style>
</head>
<body>

<div id="video-section">
    <div id="player">
        <div style="text-align:center; padding-top:90px; color:#444;">اختر حلقة للمشاهدة</div>
    </div>
</div>

<div id="list">جاري التحميل...</div>

<script>
    const SHEET_ID = '1x5V6UbWbNIfHVCdQsadbWYkNDISVd7teHnOXt6CwoiY';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1); 
            let html = '';
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                if (cols.length >= 2) {
                    html += `<div class="episode-card" onclick="playVideo('${cols[1]}')">
                                <div class="anime-title">${cols[0]}</div>
                                <div class="ep-info">${cols[2] || ''}</div>
                             </div>`;
                }
            });
            document.getElementById('list').innerHTML = html;
        } catch (e) { document.getElementById('list').innerHTML = "خطأ في الجلب"; }
    }

    function playVideo(key) {
        let finalUrl = "";
        
        // إذا وضعت الكود فقط (مثل mxict)
        if (!key.includes("http")) {
            finalUrl = `https://seekstreaming.com/embed-${key}.html`;
        } else {
            // إذا وضعت الرابط كاملاً، نتأكد أنه بصيغة embed
            if (key.includes("seekstreaming.com/") && !key.includes("embed-")) {
                finalUrl = key.replace("seekstreaming.com/", "seekstreaming.com/embed-") + ".html";
            } else {
                finalUrl = key;
            }
        }

        // إزالة الـ Sandbox نهائياً للسماح لسيرفر SeekStreaming بالعمل
        document.getElementById('player').innerHTML = `
            <iframe 
                src="${finalUrl}" 
                allowfullscreen 
                allow="autoplay; fullscreen"
                frameborder="0">
            </iframe>`;
    }

    loadData();
</script>

</body>
</html>
