<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الأنمي التلقائية</title>
    <style>
        body { background: #000; color: white; margin: 0; font-family: sans-serif; text-align: center; }
        .player-unit { position: sticky; top: 0; width: 100%; aspect-ratio: 16/9; background: #111; border-bottom: 2px solid #00bcd4; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; }
        .anime-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .anime-card { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; cursor: pointer; font-size: 14px; }
        .anime-card:active { background: #00bcd4; color: #000; }
    </style>
</head>
<body>

    <div class="player-unit">
        <iframe id="video-frame" src="" allowfullscreen></iframe>
    </div>

    <div id="loading" style="padding: 20px;">جاري جلب أحدث الحلقات...</div>
    <div id="anime-list" class="anime-grid"></div>

    <script>
        // استخدام التوكن الخاص بك مباشرة كما تسمح وثائق Vidoza
        const API_TOKEN = 'beh5wtrl4tyhnqefytw0ps3gu6hovzhlxkfeis5zxglr0at77xqgefdaw3va';

        async function fetchAnime() {
            try {
                // الاتصال المباشر أصبح ممكناً الآن لأنك جعلت النطاق Internal
                const response = await fetch(`https://api.vidoza.net/v1/files?api_token=${API_TOKEN}`);
                const result = await response.json();

                const list = document.getElementById('anime-list');
                document.getElementById('loading').style.display = 'none';

                if (result.data && result.data.length > 0) {
                    result.data.forEach(anime => {
                        const card = document.createElement('div');
                        card.className = 'anime-card';
                        card.innerText = anime.title;
                        card.onclick = () => {
                            document.getElementById('video-frame').src = `https://vidoza.net/embed-${anime.id}.html`;
                            window.scrollTo({top: 0, behavior: 'smooth'});
                        };
                        list.appendChild(card);
                    });
                }
            } catch (err) {
                document.getElementById('loading').innerText = "خطأ: تأكد من تحديث نسخة التطبيق بعد حفظ إعدادات Median.";
            }
        }
        fetchAnime();
    </script>
</body>
</html>
