<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME RS - Professional Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --main-red: #ff0000; --bg-black: #050505; --card-bg: #111; --text-gray: #aaa; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0; }
        
        /* محرك البحث */
        .search-container { text-align: center; padding: 20px; background: #000; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        #search-input { width: 80%; max-width: 500px; padding: 12px 20px; border-radius: 25px; border: 1px solid #333; background: #111; color: white; outline: none; transition: 0.3s; text-align: center; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .anime-card { background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #222; transition: 0.3s; position: relative; }
        .anime-card:hover { border-color: var(--main-red); transform: translateY(-3px); }
        .anime-card img { width: 100%; height: 260px; object-fit: cover; }

        /* النافذة المنبثقة */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); overflow-y: auto; }
        .modal-content { background: #0d0d0d; margin: 2% auto; padding: 20px; width: 92%; max-width: 1100px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .close { position: absolute; left: 20px; top: 15px; font-size: 30px; cursor: pointer; color: var(--main-red); z-index: 10; }

        /* مشغل الفيديو الاحترافي */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; background: #000; border: 1px solid #333; margin-bottom: 20px; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        .tabs { display: flex; gap: 15px; margin: 20px 0; border-bottom: 1px solid #333; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: #666; cursor: pointer; padding: 10px 15px; font-weight: bold; transition: 0.3s; white-space: nowrap; font-size: 0.9rem; }
        .tab-btn.active { color: var(--main-red); border-bottom: 3px solid var(--main-red); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .season-selector { background: #1a1a1a; color: white; border: 1px solid var(--main-red); padding: 10px; border-radius: 5px; width: 100%; margin-bottom: 15px; cursor: pointer; outline: none; }
        .ep-btn { background: #222; color: white; padding: 12px 25px; border-radius: 5px; border: 1px solid #333; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .ep-btn:hover, .ep-btn.active { background: var(--main-red); border-color: var(--main-red); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="search-input" placeholder="بحث في الأنميات..." onkeyup="filterAnime()">
</div>

<div class="container">
    <div id="anime-list" class="anime-grid"></div>
</div>

<div id="fullModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-data"></div>
    </div>
</div>

<script>
    const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
    const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function translateAr(text) {
        if(!text) return "غير متوفر";
        try {
            const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=${encodeURI(text)}`);
            const d = await r.json();
            return d[0].map(s => s[0]).join('');
        } catch { return text; }
    }

    async function init() {
        const { data: episodes } = await _supabase.from('episodes').select('*');
        const list = document.getElementById('anime-list');
        const groups = {};
        
        episodes.forEach(e => { if (!groups[e.mal_id]) groups[e.mal_id] = []; groups[e.mal_id].push(e); });

        for (const id in groups) {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${id}/full`);
            const { data: anime } = await res.json();
            
            const card = document.createElement('div');
            card.className = 'anime-card';
            card.setAttribute('data-search', `${anime.title} ${anime.title_japanese}`);
            card.innerHTML = `
                <img src="${anime.images.jpg.large_image_url}">
                <div style="padding:10px; font-size:0.8rem; text-align:center; font-weight:bold;">${anime.title}</div>
            `;
            card.onclick = () => showDetails(anime, groups[id]);
            list.appendChild(card);
        }
    }

    async function showDetails(a, eps) {
        const modal = document.getElementById('fullModal');
        const content = document.getElementById('modal-data');
        modal.style.display = 'block';
        content.innerHTML = "<h3 style='text-align:center;'>جاري التجهيز...</h3>";

        const seasonsMap = {};
        eps.forEach(e => {
            if (!seasonsMap[e.season_number]) seasonsMap[e.season_number] = [];
            seasonsMap[e.season_number].push(e);
        });
        const sortedSeasonKeys = Object.keys(seasonsMap).sort((a, b) => a - b);

        const arStory = await translateAr(a.synopsis);

        content.innerHTML = `
            <div id="player-section" class="video-wrapper">
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center;">
                    <p>اختر حلقة لبدء المشاهدة</p>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 250px 1fr; gap:25px;">
                <div>
                    <img src="${a.images.jpg.large_image_url}" style="width:100%; border-radius:10px; border:1px solid #333;">
                    <div style="margin-top:15px;">
                        <select class="season-selector" id="season-dropdown">
                            ${sortedSeasonKeys.map(s => `<option value="${s}">الموسم ${s}</option>`).join('')}
                        </select>
                    </div>
                </div>
                
                <div>
                    <h1 style="margin:0; color:var(--main-red);">${a.title}</h1>
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab(event, 'info')">المشاهدة والقصة</button>
                    </div>

                    <div id="info" class="tab-content active">
                        <h3>حلقات المشاهدة:</h3>
                        <div id="episodes-display" style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:20px;"></div>
                        <h3 style="color:var(--main-red);">القصة</h3>
                        <p style="line-height:1.7; color:#ccc;">${arStory}</p>
                    </div>
                </div>
            </div>
        `;

        const dropdown = document.getElementById('season-dropdown');
        const display = document.getElementById('episodes-display');
        const playerSection = document.getElementById('player-section');

        // دالة تشغيل الحلقة داخل الموقع
        window.playVideo = (url, btn) => {
            document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            playerSection.innerHTML = `<iframe src="${url}" allowfullscreen scrolling="no" allow="autoplay; fullscreen"></iframe>`;
            window.scrollTo({ top: 0, behavior: 'smooth' }); // العودة للمشغل عند الضغط
        };

        const updateEps = (sNum) => {
            const sorted = seasonsMap[sNum].sort((x, y) => x.episode_number - y.episode_number);
            display.innerHTML = sorted.map(e => `
                <button class="ep-btn" onclick="playVideo('${e.video_url}', this)">الحلقة ${e.episode_number}</button>
            `).join('');
        };

        dropdown.onchange = (e) => updateEps(e.target.value);
        updateEps(sortedSeasonKeys[0]);
    }

    function filterAnime() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.anime-card').forEach(card => {
            card.style.display = card.getAttribute('data-search').toLowerCase().includes(q) ? 'block' : 'none';
        });
    }

    function closeModal() { document.getElementById('fullModal').style.display = 'none'; }
    function switchTab(e, id) {
        document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
    }
    init();
</script>
</body>
</html>
